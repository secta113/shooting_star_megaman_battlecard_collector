<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="流星のロックマン2のバトルカード収集率をトラッキングし、未所持の31枚のカードを効率よく集めるためのエリア別獲得ルートをインタラクティブに確認できる、高機能なチェックリストアプリです。">
  <title>流星のロックマン2 バトルカード収集チェッカー & 獲得フローチャート</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Header with Stats -->
    <header class="app-header glass-panel" id="app-header-sec">
      <div class="header-top">
        <div class="title-area">
          <a href="../index.html" class="btn-back-portal" style="text-decoration: none; font-family: var(--font-cyber); font-size: 0.8rem; padding: 6px 12px; border-radius: 4px; border: 1px solid rgba(0, 242, 254, 0.3); color: var(--color-standard); margin-right: 15px; background: rgba(0, 242, 254, 0.05); transition: all 0.3s ease; display: inline-flex; align-items: center;" onmouseover="this.style.background='rgba(0, 242, 254, 0.2)'; this.style.borderColor='#00f2fe';" onmouseout="this.style.background='rgba(0, 242, 254, 0.05)'; this.style.borderColor='rgba(0, 242, 254, 0.3)';">◀ PORTAL</a>
          <div class="logo-icon" id="logo-emblem">⚡</div>
          <div>
            <h1>RYUSEI 2 CARD CHECKER</h1>
            <p style="font-size: 0.85rem; color: var(--text-muted); font-family: var(--font-cyber);">WAVE WORLD CARD CHECKLIST & ROUTING SYSTEM</p>
          </div>
        </div>
        
        <div class="controls-right">
          <button class="btn-action" id="btn-export" style="color: var(--color-standard); border-color: rgba(0, 242, 254, 0.3);" title="現在のチェック状態をJSONファイルとして保存（ダウンロード）します">
            データ書出
          </button>
          <button class="btn-action" id="btn-import" style="color: var(--color-blank); border-color: rgba(226, 232, 240, 0.3);" title="保存したJSONファイルを読み込んで状態を復元します">
            データ読込
          </button>
          <input type="file" id="import-file-input" style="display: none;" accept=".json">
          <button class="btn-action" id="btn-reset-default" title="ユーザー様指定の31枚未所持状態にリセットします">
            未所持リストにリセット
          </button>
          <button class="btn-action" id="btn-check-all" style="color: var(--color-acquired); border-color: rgba(16, 185, 129, 0.3);" title="すべてのカードを所持状態に設定します">
            すべて所持にする
          </button>
        </div>
      </div>
      
      <!-- Stats Progress Bars -->
      <div class="stats-container">
        <!-- Standard Class Stat -->
        <div class="stat-box glass-panel" id="stat-standard-box">
          <div class="stat-label">Standard Class</div>
          <div class="stat-value" id="stat-standard-val">0 <span>/ 150</span></div>
          <div class="stat-progress-bar-bg">
            <div class="stat-progress-bar-fill" id="stat-standard-fill" style="width: 0%; color: var(--color-standard);"></div>
          </div>
        </div>
        
        <!-- Mega Class Stat -->
        <div class="stat-box glass-panel" id="stat-mega-box">
          <div class="stat-label">Mega Class</div>
          <div class="stat-value" id="stat-mega-val">0 <span>/ 42</span></div>
          <div class="stat-progress-bar-bg">
            <div class="stat-progress-bar-fill" id="stat-mega-fill" style="width: 0%; color: var(--color-mega);"></div>
          </div>
        </div>
        
        <!-- Giga Class Stat -->
        <div class="stat-box glass-panel" id="stat-giga-box">
          <div class="stat-label">Giga Class</div>
          <div class="stat-value" id="stat-giga-val">0 <span>/ 15</span></div>
          <div class="stat-progress-bar-bg">
            <div class="stat-progress-bar-fill" id="stat-giga-fill" style="width: 0%; color: var(--color-giga);"></div>
          </div>
        </div>
      </div>
    </header>
    
    <!-- Control Bar (Tabs, Search) -->
    <div class="nav-control-panel glass-panel" id="nav-control-bar">
      <div class="tabs">
        <button class="tab-btn active" id="tab-btn-checklist" onclick="switchTab('checklist')">カードチェックリスト</button>
        <button class="tab-btn" id="tab-btn-flowchart" onclick="switchTab('flowchart')">獲得フローチャート (31枚)</button>
      </div>
      
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="card-search" placeholder="カード名・入手先で検索...">
      </div>
    </div>
    
    <!-- Card Class Filter Chips (Only shown on Checklist tab) -->
    <div class="class-filters" id="class-filter-bar">
      <div class="filter-chip active" data-class="all" id="filter-all">ALL</div>
      <div class="filter-chip" data-class="standard" id="filter-standard">Standard</div>
      <div class="filter-chip" data-class="mega" id="filter-mega">Mega</div>
      <div class="filter-chip" data-class="giga" id="filter-giga">Giga</div>
      <div class="filter-chip" data-class="blank" id="filter-blank">Blank</div>
      <div class="filter-chip" data-class="gentei" id="filter-gentei">Event</div>
    </div>
    
    <!-- Checklist Tab Content -->
    <div class="tab-content active glass-panel" id="tab-content-checklist">
      <div class="table-wrapper">
        <table class="card-table">
          <thead>
            <tr>
              <th style="width: 80px;">No.</th>
              <th style="width: 180px;">名前</th>
              <th>入手先</th>
              <th style="width: 250px;">ウイルス情報（出現場所）</th>
              <th style="width: 80px; text-align: center;">所持</th>
            </tr>
          </thead>
          <tbody id="card-table-body">
            <!-- Dynamically populated via JS -->
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Flowchart Tab Content -->
    <div class="tab-content" id="tab-content-flowchart">
      <!-- Flowchart renderer target -->
      <div id="flowchart-renderer-container">
        <!-- Dynamically populated via flowchart.js -->
      </div>
    </div>
    
  </div>

  <!-- Scripts -->
  <script src="card_data.js"></script>
  <script src="flowchart.js"></script>
  <script src="app.js"></script>
</body>
</html>
